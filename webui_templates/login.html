<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - iOS Backup Machine</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --text: #202124;
            --text-muted: #5f6368;
            --border: #dadce0;
            --error: #c5221f;
            --error-bg: #fce8e6;
            --success: #0d652d;
            --success-bg: #e6f4ea;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img { width: 48px; height: 48px; margin-bottom: 16px; }
        .login-card h1 { font-size: 20px; margin-bottom: 4px; }
        .login-card .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: var(--primary);
            color: #fff;
            transition: background 0.15s;
        }
        .btn:hover { background: var(--primary-hover); }
        .flash {
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
        }
        .flash-error { background: var(--error-bg); color: var(--error); }
        .flash-success { background: var(--success-bg); color: var(--success); }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='icon.svg') }}" alt="Logo">
        <h1>iOS Backup Machine</h1>
        <p class="subtitle">Enter your password to continue</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autofocus required>
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>
    </div>
</body>
</html>
