<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
  <defs>
    <clipPath id="apple-clip">
      <!-- Apple silhouette path (bite on right side) -->
      <path d="M32 14c1.5-3.5 5-6 8-6c0.5 3-1 6-3.5 8.2
               C40 16.5 44 18 46 21c2.5 3.8 3 9.5 0.5 16
               c-1.5 4-3.5 7-6 9.5c-2 2-4 3.5-6.5 3.5
               c-1.5 0-3-0.5-4.5-1c-1.5-0.5-3-1-4.5-1
               c-1.5 0-3 0.5-4.5 1c-1.5 0.5-3 1-4.5 1
               c-2.5 0-4.5-1.5-6.5-3.5c-2.5-2.5-4.5-5.5-6-9.5
               c-2.5-6.5-2-12.2 0.5-16c2-3 6-4.5 9.5-5
               c3-0.3 6 1 8 2.5c1.5-1.2 3.5-2 5.5-2.5
               C30.5 15.5 31 14.5 32 14z"/>
    </clipPath>
  </defs>
  <!-- Rainbow stripes clipped to apple shape -->
  <g clip-path="url(#apple-clip)">
    <rect x="8" y="14" width="40" height="6" fill="#61BB46"/>
    <rect x="8" y="20" width="40" height="6" fill="#FDB827"/>
    <rect x="8" y="26" width="40" height="6" fill="#F5821F"/>
    <rect x="8" y="32" width="40" height="6" fill="#E03A3E"/>
    <rect x="8" y="38" width="40" height="6" fill="#963D97"/>
    <rect x="8" y="44" width="40" height="6" fill="#009DDC"/>
  </g>
  <!-- Leaf -->
  <path d="M32 14c1.5-3.5 4.5-5.5 7.5-5.8c-0.5 2.5-2 4.5-4 6" stroke="#61BB46" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Downward arrow (white) centered in apple body -->
  <line x1="32" y1="25" x2="32" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="26,35 32,41 38,35" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
