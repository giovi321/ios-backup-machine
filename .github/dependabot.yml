version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/docs"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docs:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Major bumps of Astro or Starlight are deliberate migrations, not
    # background updates, so leave them to a manual version bump.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
