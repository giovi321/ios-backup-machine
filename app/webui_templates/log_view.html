{% extends "base.html" %}
{% block title %}{{ filename }} - iOS Backup Machine{% endblock %}
{% block content %}
<h1>{{ filename }}</h1>
<div style="display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap;">
    <a href="{{ url_for('logs') }}" style="color:var(--primary); text-decoration:none; font-size:14px;">&larr; Back to logs</a>
    <form method="POST" action="{{ url_for('delete_log', filename=filename) }}" onsubmit="return confirm('Delete {{ filename }}?');" style="margin:0;">
        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
    </form>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="auto-refresh" style="width:16px;height:16px;accent-color:var(--primary);">
        Live tail (auto-refresh)
    </label>
</div>

<div class="card">
    <pre id="log-content" style="
        background: #1a1a1a;
        color: #d0d0d0;
        padding: 16px;
        border-radius: 6px;
        font-size: 12px;
        font-family: 'Consolas', 'Monaco', monospace;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 600px;
        overflow-y: auto;
    ">{{ content }}</pre>
</div>

<script>
(function() {
    var logEl = document.getElementById('log-content');
    var checkbox = document.getElementById('auto-refresh');
    var timer = null;

    // Auto-scroll to bottom on load
    logEl.scrollTop = logEl.scrollHeight;

    // Enable live mode if ?live=1 in URL
    if (window.location.search.indexOf('live=1') !== -1) {
        checkbox.checked = true;
        startLive();
    }

    function refreshLog() {
        var url = window.location.pathname;
        fetch(url)
            .then(function(r) { return r.text(); })
            .then(function(html) {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var newPre = doc.getElementById('log-content');
                if (newPre && logEl) {
                    logEl.textContent = newPre.textContent;
                    logEl.scrollTop = logEl.scrollHeight;
                }
            })
            .catch(function() {});
    }

    function startLive() {
        logEl.scrollTop = logEl.scrollHeight;
        timer = setInterval(refreshLog, 2000);
    }

    function stopLive() {
        if (timer) clearInterval(timer);
        timer = null;
    }

    checkbox.addEventListener('change', function() {
        if (this.checked) {
            startLive();
        } else {
            stopLive();
        }
    });
})();
</script>
{% endblock %}
